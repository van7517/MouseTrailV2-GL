name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Stage single exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/MouseTrailV2.exe dist/MouseTrailV2.exe
          # single-file package (no config.json / README)
          Compress-Archive -Path dist/MouseTrailV2.exe -DestinationPath MouseTrailV2-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseTrailV2-windows-x64
          path: |
            dist/MouseTrailV2.exe
            MouseTrailV2-windows-x64.zip
