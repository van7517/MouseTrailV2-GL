name: 构建 Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    name: 编译 Windows x64
    runs-on: windows-2022
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: 编译 Release
        run: cmake --build build --config Release --parallel

      - name: 整理产物
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/MouseTrailV2.exe dist/
          Copy-Item config.json dist/
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          Compress-Archive -Path dist/* -DestinationPath MouseTrailV2-windows-x64.zip -Force

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: MouseTrailV2-windows-x64
          path: |
            dist/**
            MouseTrailV2-windows-x64.zip

      - name: 打包 zip
        if: github.event_name == 'release'
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath MouseTrailV2-windows-x64.zip -Force

      - name: 上传到 Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: MouseTrailV2-windows-x64.zip
